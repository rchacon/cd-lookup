name: WordPress Plugin Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin zip
        working-directory: cd-lookup
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p /tmp/build/cd-lookup
          cp -r cd-lookup.php src templates README.md /tmp/build/cd-lookup/
          cd /tmp/build
          zip -r "$GITHUB_WORKSPACE/cd-lookup-${VERSION}.zip" cd-lookup

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "cd-lookup-${GITHUB_REF_NAME#v}.zip" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
